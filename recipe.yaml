name: Zombie Apocalypse Localhost
version: 1.1
author: Grok dla Ciebie
description: Standalone zombie + zniszczone wieżowce + safe zones + loot

tasks:
  # Pobierz system zombie (standalone)
  - action: download_github
    src: WeponzTV/Standalone-Zombie-System
    ref: main
    dest: resources/[zombie]/standalone-zombies

  # Pobierz mapę z zniszczonymi budynkami i wieżowcami
  - action: download_github
    src: SparksScripts/Total-Apocalypse
    ref: main
    dest: resources/[maps]/total-apocalypse

  # Zapisz server.cfg
  - action: write_file
    path: server.cfg
    content: |
      sv_hostname "🧟 Zombie Apocalypse - Localhost"
      sv_maxclients 32
      sv_licenseKey cfxk_1a5jSCK62kxY5mo8mMLTS_3QyiL1

      # Podstawowe zasoby
      ensure mapmanager
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure basic-gamemode
      ensure hardcap
      ensure scoreboard

      # Zombie + Mapa
      ensure standalone-zombies
      ensure total-apocalypse

      # Onesync (ważne przy wielu zombie)
      onesync on
