name: ZombieApocalypseULTRASURVIVAL2026_Full
description: Pełny rozbudowany mod zombie survival 2026. Oczko + inventory pod ALT, looting zombie (pojazd + pieszo), system budowania baz, zniszczone Sandy Shores + Paleto Bay + całe Los Santos, paski głodu i picia, sklepy z jedzeniem/wodą. Wszystko pobiera się automatycznie.
version: 2.2
framework: standalone
type: resource

dependencies:
  - ox_lib
  - ox_inventory
  - oxmysql

tasks:
  - action: download_github
    src: CommunityOx/ox_lib
    ref: main
    dest: resources/[ox]/ox_lib

  - action: download_github
    src: CommunityOx/ox_inventory
    ref: main
    dest: resources/[ox]/ox_inventory

  - action: download_github
    src: overextended/oxmysql
    ref: master
    dest: resources/[ox]/oxmysql

key_features:
  - ALT_eye_system:
      key: "LMENU"
      hold_to_open: true
      custom_reticle: true
      eye_icon: true
      auto_open_inventory: true
  - full_inventory:
      slots: 72
      max_weight: 65.0
      categories: true
      apocalypse_theme: true
      polish_names: true
  - zombie_looting:
      eye_mode_only: true
      vehicle_runover: true
      approach_loot: true
      drop_materials: true
  - base_building_system:
      raycast_placement: true
      material_consumption: true
  - destroyed_map:
      sandy_shores: true
      paleto_bay: true
      los_santos: true
      high_density_rubble: true
  - survival_system:
      hunger_thirst_hud: true
      food_water_shops: true

config:
  Config = {
      AltKey = 0x12, -- Left Alt
      EyeModeEnabled = true,
      LootOnlyInEyeMode = true,
      DestroyedMapDensity = "high",
      Locale = "pl"
  }

instructions:
  - "Pobierz wszystko z aktualnych repo CommunityOx."
  - "Wygeneruj kompletny resource z wszystkimi plikami (client, server, html, stream, config)."
  - "Custom NUI eye/reticle ma się pojawiać tylko pod ALT i otwierać inventory."
  - "Looting zombie, budowanie baz i zniszczone obszary mają być w pełni działające."
  - "Dodaj dużo polskich tłumaczeń (Ekwipunek, Materiały na bazę, Głód, Pragnienie, Buduj, Lootuj itd.)."
  - "Zrób resource bardzo rozbudowany, zoptymalizowany i gotowy do uruchomienia."

generate_full_resource: true
