name: ZombieApocalypseULTRASURVIVAL2026_Full
description: Pełny mod zombie survival z oczkiem pod ALT, rozbudowanym inventory, lootingiem zombie, budowaniem baz, zniszczonymi mapami (Sandy, Paleto, LS), paskami głodu i picia. Tworzy server.cfg automatycznie.
version: 2.7
framework: standalone
type: resource

tasks:
  # ox_lib
  - action: download_github
    src: CommunityOx/ox_lib
    ref: main
    dest: resources/[ox]/ox_lib

  # ox_inventory
  - action: download_github
    src: CommunityOx/ox_inventory
    ref: main
    dest: resources/[ox]/ox_inventory

  # oxmysql jako zip (najpewniejsze)
  - action: download_file
    url: https://github.com/CommunityOx/oxmysql/releases/latest/download/oxmysql.zip
    dest: resources/[ox]/oxmysql.zip
    extract: true
    extract_to: resources/[ox]/oxmysql

  # Tworzenie server.cfg (OBOWIĄZKOWE!)
  - action: write_file
    file: ./server.cfg
    data: |
      # =====================================================
      # Zombie Apocalypse ULTRA SURVIVAL 2026 - server.cfg
      # =====================================================

      sv_hostname "🧟 Zombie Apocalypse ULTRA SURVIVAL 2026 🧟"
      sv_maxclients {{maxClients}}
      sv_licenseKey "{{svLicense}}"

      # Database (zmień dane po instalacji jeśli używasz MySQL)
      set mysql_connection_string "{{dbConnectionString}}"

      # Główne resources
      ensure oxmysql
      ensure ox_lib
      ensure ox_inventory

      # Twój mod zombie
      ensure zombie_apocalypse

      # Podstawowe FiveM resources
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure basic-gamemode
      ensure hardcap
      ensure mapmanager

      # Ustawienia
      sv_scriptHookAllowed 0
      sv_enforceGameBuild 3258
      sets locale "pl-PL"
      sets tags "zombie, survival, apocalypse, roleplay, polski"

      # Zalecane dodatkowe linie (możesz edytować później w txAdmin)
      # sv_endpoint "twój_ip:port"   <-- dodaj jeśli potrzeba
      # load_server_icon "server.png"

key_features:
  - ALT_eye_system: "Przytrzymanie Left Alt włącza custom oczko (reticle + eye) i otwiera inventory"
  - inventory: "Rozbudowany drag & drop, 72 sloty, kategorie, apocalypse theme, polskie nazwy"
  - zombie_looting: "Looting tylko w trybie oczka – najazd pojazdem lub podejście"
  - base_building: "System budowania baz z raycast i zużyciem materiałów"
  - destroyed_map: "Dużo rubble, wraków i zniszczonych budynków w Sandy Shores, Paleto Bay i Los Santos"
  - survival: "Paski głodu i picia + sklepy z jedzeniem i wodą"

instructions:
  - "Pobierz ox_lib, ox_inventory i oxmysql."
  - "Utwórz kompletny plik server.cfg z placeholderami txAdmin."
  - "Wygeneruj pełny resource o nazwie 'zombie_apocalypse' ze wszystkimi funkcjami."
  - "Dodaj polskie tłumaczenia w całym modzie."
  - "Custom oczko pod ALT ma być widoczne tylko w trybie ALT i umożliwiać looting + otwieranie inventory."
  - "Zrób mod bardzo rozbudowany i gotowy do użycia."

generate_full_resource: true
