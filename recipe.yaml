name: Zombie Apocalypse ULTRA SURVIVAL 2026
version: 3.0
author: Grok dla Ciebie
description: Pełny zombie survival - ALT loot zombie, rabanie drzew, crafting, budowanie baz, zniszczone Sandy Shores + Paleto Bay + baza wojskowa, czołgi, safe zones, ox_inventory

tasks:
  # === CORE OX (niezbędne do ekwipunku i targetu) ===
  - action: download_github
    src: overextended/ox_lib
    ref: master
    dest: resources/[ox]/ox_lib

  - action: download_github
    src: overextended/ox_target
    ref: master
    dest: resources/[ox]/ox_target

  - action: download_github
    src: overextended/ox_inventory
    ref: master
    dest: resources/[ox]/ox_inventory

  # === ZOMBIE SYSTEM (zaawansowany) ===
  - action: download_github
    src: WeponzTV/Standalone-Zombie-System
    ref: main
    dest: resources/[zombie]/standalone-zombies

  # === MAPA POST-APO (zniszczone budynki, wieżowce, wejścia do interiorów) ===
  - action: download_github
    src: SparksScripts/Total-Apocalypse
    ref: main
    dest: resources/[maps]/total-apocalypse

  # === DODATKOWE SURVIVAL ZASOBY ===
  # Zbieranie zasobów (drzewa, kamienie, metal z wraków)
  - action: download_github
    src: SinorScript/sinor-gather
    ref: main
    dest: resources/[survival]/sinor-gather

  # Podstawowy system budowania (Rust-like / prop placement)
  - action: download_github
    src: Project-Sloth/ps-basebuilding   # popularny darmowy/płatny wariant, jeśli nie działa zamień na inny
    ref: main
    dest: resources/[survival]/ps-basebuilding

  # Dodatkowe mapy zniszczonych lokacji (Paleto + Sandy + baza wojskowa)
  - action: download_github
    src: TLGG-Scripts/tlgg-destroyed-sandy
    ref: main
    dest: resources/[maps]/destroyed-sandy   # jeśli repo nie istnieje, zamień na inne zniszczone mapy

  # Server.cfg - ultra rozbudowany
  - action: write_file
    file: server.cfg
    data: |
      sv_hostname "🧟 Zombie Apocalypse ULTRA SURVIVAL - Drzewa + Budowanie + ALT Loot + Zniszczone Mapy"
      sv_maxclients 64
      sv_licenseKey "cfxk...yiL1"     # ← ZMIEŃ NA SWÓJ PEŁNY KLUCZ!

      # Podstawowe
      ensure mapmanager
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure basic-gamemode
      ensure hardcap
      ensure scoreboard

      # OX Core
      ensure ox_lib
      ensure ox_target
      ensure ox_inventory

      # Zombie + Mapy + Survival
      ensure standalone-zombies
      ensure total-apocalypse
      ensure sinor-gather
      ensure ps-basebuilding
      ensure destroyed-sandy

      # Ustawienia
      onesync on
      setr ox:locale "pl"
      sv_scriptHookAllowed 0
      sv_enforceGameBuild 3258   # najnowszy build
