name: ZombieApocalypseULTRASURVIVAL2026_Full
description: Pełny rozbudowany mod zombie z oczkiem pod ALT, inventory, lootingiem zombie (pojazd + pieszo), budowaniem baz, zniszczonymi Sandy Shores, Paleto Bay i Los Santos, paskami głodu/pic ia oraz sklepami. Wszystko pobiera się automatycznie z aktualnych forków CommunityOx.
version: 2.4
framework: standalone
type: resource

dependencies:
  - ox_lib
  - ox_inventory
  - oxmysql

tasks:
  - action: download_github
    src: CommunityOx/ox_lib
    ref: main
    dest: resources/[ox]/ox_lib

  - action: download_github
    src: CommunityOx/ox_inventory
    ref: main
    dest: resources/[ox]/ox_inventory

  - action: download_github
    src: CommunityOx/oxmysql
    ref: main
    dest: resources/[ox]/oxmysql

key_features:
  - ALT_eye_reticle_system: "Przytrzymanie Left Alt włącza oczko + otwiera inventory"
  - advanced_inventory: "72 sloty, kategorie, apocalypse theme, polskie nazwy"
  - zombie_looting: "Tylko w trybie oczka – najazd pojazdem lub podejście"
  - base_building: "Raycast placement + zużycie materiałów"
  - destroyed_map: "Wysoka gęstość rubble w Sandy Shores, Paleto Bay i całym LS"
  - survival_hud: "Paski głodu i picia + sklepy z jedzeniem/wodą"

instructions:
  - "Użyj wyłącznie CommunityOx repozytoriów (ox_lib, ox_inventory, oxmysql)."
  - "Wygeneruj kompletny, gotowy resource ze wszystkimi plikami."
  - "Custom reticle + eye icon ma się pojawiać tylko pod ALT."
  - "Dodaj polskie tłumaczenia (Ekwipunek, Materiały, Głód, Pragnienie, Lootuj zombie, Buduj bazę itd.)."
  - "Zrób mod bardzo rozbudowany i zoptymalizowany."

generate_full_resource: true
