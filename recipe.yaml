name: ZombieApocalypseULTRASURVIVAL2026_Full
description: Pełny zombie survival mod 2026 z oczkiem pod ALT, rozbudowanym inventory, lootingiem zombie, budowaniem baz, zniszczonymi mapami (Sandy, Paleto, LS), paskami głodu/pic ia i sklepami. Wszystko pobiera się automatycznie z aktualnych źródeł.
version: 2.3
framework: standalone
type: resource

dependencies:
  - ox_lib
  - ox_inventory
  - oxmysql

tasks:
  - action: download_github
    src: CommunityOx/ox_lib
    ref: main
    dest: resources/[ox]/ox_lib

  - action: download_github
    src: CommunityOx/ox_inventory
    ref: main
    dest: resources/[ox]/ox_inventory

  - action: download_github
    src: CommunityOx/oxmysql
    ref: main
    dest: resources/[ox]/oxmysql

key_features:
  - ALT_eye_reticle:
      key: "LMENU"
      hold_to_activate: true
      custom_reticle_and_eye: true
      auto_open_inventory: true
  - advanced_inventory:
      slots: 72
      max_weight: 65
      apocalypse_theme: true
      polish_translation: true
  - zombie_looting_via_eye:
      vehicle_runover: true
      ped_approach: true
      materials_drop: true
  - base_building:
      raycast_placement: true
      materials_required: true
  - destroyed_map_areas:
      sandy_shores: true
      paleto_bay: true
      los_santos: true
      high_density: true
  - survival_mechanics:
      hunger_thirst_hud: true
      food_water_from_shops: true

instructions:
  - "Użyj wyłącznie CommunityOx repozytoriów (ox_lib, ox_inventory, oxmysql) – to aktualne forki."
  - "Wygeneruj kompletny resource ze wszystkimi plikami (client/server/html/stream/config)."
  - "Custom oczko (reticle + eye) pod Left Alt ma otwierać inventory i umożliwiać looting zombie."
  - "Dodaj polskie tłumaczenia wszędzie gdzie możliwe."
  - "Zrób mod bardzo rozbudowany, zoptymalizowany i gotowy do uruchomienia po deployment."

generate_full_resource: true
