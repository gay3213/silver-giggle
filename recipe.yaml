name: Zombie Apocalypse + Budowanie + Ekwipunek + ALT Loot
version: 1.3
author: Grok dla Ciebie
description: Zombie + mapa + ox_inventory + ox_target (ALT loot zombie) + budowanie

tasks:
  # === ZOMBIE SYSTEM ===
  - action: download_github
    src: WeponzTV/Standalone-Zombie-System
    ref: main
    dest: resources/[zombie]/standalone-zombies

  # === MAPA Z ZNISZCZONYMI WIEŻOWCAMI ===
  - action: download_github
    src: SparksScripts/Total-Apocalypse
    ref: main
    dest: resources/[maps]/total-apocalypse

  # === OX LIB (wymagane) ===
  - action: download_github
    src: overextended/ox_lib
    ref: main
    dest: resources/[ox]/ox_lib

  # === OX TARGET (ALT + oczko do lootowania zombie) ===
  - action: download_github
    src: overextended/ox_target
    ref: main
    dest: resources/[ox]/ox_target

  # === OX INVENTORY (ekwipunek z drag & drop) ===
  - action: download_github
    src: overextended/ox_inventory
    ref: main
    dest: resources/[ox]/ox_inventory

  # === SERVER.CFG ===
  - action: write_file
    path: server.cfg
    content: |
      sv_hostname "🧟 Zombie Apocalypse - Localhost [Budowanie + ALT Loot]"
      sv_maxclients 32
      sv_licenseKey cfxk_1a5jSCK62kxY5mo8mMLTS_3QyiL1     # ← ZMIEŃ na swój pełny klucz!

      # Podstawowe
      ensure mapmanager
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure basic-gamemode
      ensure hardcap
      ensure scoreboard

      # OX + Zombie + Mapa
      ensure ox_lib
      ensure ox_target
      ensure ox_inventory
      ensure standalone-zombies
      ensure total-apocalypse

      # Ważne przy zombie
      onesync on
      setr ox:locale "pl"   # polski język w ekwipunku
