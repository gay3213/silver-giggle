name: ZombieApocalypseULTRASURVIVAL2026_Full
description: Pełny rozbudowany mod zombie survival 2026. Oczko pod ALT (reticle + eye), zaawansowany inventory, looting zombie (pojazd + pieszo), system budowania baz, zniszczone Sandy Shores + Paleto Bay + Los Santos, paski głodu i picia + sklepy. Wszystko z automatycznym setupem.
version: 2.6
framework: standalone
type: resource

tasks:
  # Pobieranie ox_lib
  - action: download_github
    src: CommunityOx/ox_lib
    ref: main
    dest: resources/[ox]/ox_lib

  # Pobieranie ox_inventory
  - action: download_github
    src: CommunityOx/ox_inventory
    ref: main
    dest: resources/[ox]/ox_inventory

  # Pobieranie oxmysql jako zip (najpewniejsze)
  - action: download_file
    url: https://github.com/CommunityOx/oxmysql/releases/latest/download/oxmysql.zip
    dest: resources/[ox]/oxmysql.zip
    extract: true
    extract_to: resources/[ox]/oxmysql

  # Tworzenie server.cfg
  - action: write_file
    file: ./server.cfg
    data: |
      # =============================================
      # Zombie Apocalypse ULTRA SURVIVAL 2026
      # =============================================

      sv_hostname "Zombie Apocalypse ULTRA SURVIVAL 2026"
      sv_maxclients {{maxClients}}
      sv_licenseKey "{{svLicense}}"

      # Database connection - zmień na swoje dane po instalacji
      set mysql_connection_string "server=127.0.0.1;database=zapocalypse;userid=root;password=;"

      # Resources
      ensure oxmysql
      ensure ox_lib
      ensure ox_inventory

      # Twój główny mod zombie
      ensure zombie_apocalypse

      # Podstawowe FiveM resources
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure basic-gamemode
      ensure hardcap
      ensure mapmanager

      # Ustawienia
      sv_scriptHookAllowed 0
      sv_enforceGameBuild 3258
      load_server_icon "server.png"   # dodaj własny plik server.png jeśli chcesz

      # Dodatkowe ustawienia (możesz edytować później)
      sets locale "pl-PL"
      sets tags "zombie, survival, roleplay, apocalypse"

instructions:
  - "Pobierz ox_lib i ox_inventory z CommunityOx."
  - "Pobierz oxmysql jako zip i wypakuj automatycznie."
  - "Utwórz pełny server.cfg z ensure dla wszystkich potrzebnych resources."
  - "Wygeneruj kompletny resource 'zombie_apocalypse' ze wszystkimi funkcjami."
  - "Custom oczko (reticle + eye icon) pod klawiszem Left Alt (LMENU) – przytrzymanie otwiera inventory + umożliwia looting zombie."
  - "Dodaj polskie tłumaczenia (Ekwipunek, Głód, Pragnienie, Materiały na bazę, Buduj bazę, Lootuj zombie itd.)."
  - "Zniszczone mapy z dużą ilością rubble w Sandy Shores, Paleto Bay i całym Los Santos."
  - "Paski głodu i picia + sklepy z jedzeniem i wodą."

generate_full_resource: true
