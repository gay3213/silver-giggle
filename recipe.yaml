name: ZombieApocalypseULTRASURVIVAL2026_Full_Final
description: Kompletny rozbudowany mod zombie survival 2026. Oczko pod ALT + inventory, looting zombie, budowanie baz, zniszczone Sandy/Paleto/LS, paski głodu i picia. Tworzy server.cfg automatycznie.
version: 2.8
framework: standalone
type: resource

tasks:
  # ox_lib
  - action: download_github
    src: CommunityOx/ox_lib
    ref: main
    dest: resources/[ox]/ox_lib

  # ox_inventory
  - action: download_github
    src: CommunityOx/ox_inventory
    ref: main
    dest: resources/[ox]/ox_inventory

  # oxmysql jako zip (najpewniejsze w 2026)
  - action: download_file
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
    dest: resources/[ox]/oxmysql.zip
    extract: true
    extract_to: resources/[ox]/oxmysql

  # Tworzenie server.cfg (to rozwiązuje błąd walidacji)
  - action: write_file
    file: ./server.cfg
    data: |
      sv_hostname "🧟 Zombie Apocalypse ULTRA SURVIVAL 2026 🧟"
      sv_maxclients {{32}}
      sv_licenseKey "{{cfxk_1Xd0r7bPqHrzdTTBpcVel_4QNHS4}}"

      # Database - zmień po pierwszym uruchomieniu jeśli potrzeba
      set mysql_connection_string "{{dbConnectionString}}"

      # Resources
      ensure oxmysql
      ensure ox_lib
      ensure ox_inventory

      # Główny mod zombie
      ensure zombie_apocalypse

      # Podstawowe resources
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure basic-gamemode
      ensure hardcap
      ensure mapmanager

      sv_scriptHookAllowed 0
      sv_enforceGameBuild 3258
      sets locale "pl-PL"
      sets tags "zombie, survival, apocalypse, polski"

key_features:
  - ALT_eye_reticle: "Przytrzymanie Left Alt włącza custom oczko (reticle + eye icon) i automatycznie otwiera inventory"
  - inventory: "72 sloty, kategorie (materiały, jedzenie, broń, narzędzia), drag & drop, apocalypse dark theme, polskie tłumaczenia"
  - zombie_looting: "Działa tylko w trybie oczka – najazd pojazdem lub podejście na piechotę. Drop materiałów na bazę"
  - base_building: "Pełny system budowania z raycast placement, preview i zużyciem materiałów z inventory"
  - destroyed_map: "Duża ilość rubble, wraków samochodów, spalonych budynków w Sandy Shores, Paleto Bay i całym Los Santos"
  - survival_hud: "Paski głodu i picia + sklepy z jedzeniem i wodą"

instructions:
  - "Pobierz ox_lib i ox_inventory z CommunityOx oraz oxmysql jako zip."
  - "Utwórz pełny plik server.cfg z placeholderami txAdmin."
  - "Wygeneruj kompletny resource o nazwie 'zombie_apocalypse' zawierający wszystkie żądane funkcje."
  - "Dodaj polskie tłumaczenia (Ekwipunek, Głód, Pragnienie, Materiały na bazę, Buduj bazę, Lootuj zombie itp.)."
  - "Custom oczko ma być widoczne tylko pod ALT i umożliwiać looting + otwieranie inventory."
  - "Zrób mod bardzo rozbudowany, zoptymalizowany i gotowy do uruchomienia."

generate_full_resource: true
