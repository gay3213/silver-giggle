name: Zombie Apocalypse Localhost
version: 1.2
author: Grok
description: Prosty zombie mod + mapa z zniszczonymi wieżowcami

tasks:
  # Pobierz Standalone Zombie System
  - action: download_github
    src: WeponzTV/Standalone-Zombie-System
    ref: main
    dest: resources/[zombie]/standalone-zombies

  # Pobierz mapę z zniszczonymi budynkami i wieżowcami
  - action: download_github
    src: SparksScripts/Total-Apocalypse
    ref: main
    dest: resources/[maps]/total-apocalypse

  # Utwórz / nadpisz server.cfg
  - action: write_file
    path: server.cfg
    content: |
      sv_hostname "🧟 Zombie Apocalypse - Localhost"
      sv_maxclients 32
      sv_licenseKey cfxk_1a5jSCK62kxY5mo8mMLTS_3QyiL1  # ← ZMIEŃ na swój pełny klucz!

      # Podstawowe zasoby FiveM
      ensure mapmanager
      ensure chat
      ensure spawnmanager
      ensure sessionmanager
      ensure basic-gamemode
      ensure hardcap
      ensure scoreboard

      # Nasze zasoby
      ensure standalone-zombies
      ensure total-apocalypse

      # Ważne przy zombie
      onesync on
