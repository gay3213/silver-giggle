name: Zombie Apocalypse ULTRA SURVIVAL 2026
version: 3.1
author: Grok
description: Pełny survival z ALT loot, drzewami, budowaniem, zniszczonymi mapami

tasks:
  # === OX CORE (ox_lib + ox_inventory działają dobrze) ===
  - action: download_github
    src: overextended/ox_lib
    ref: master
    dest: resources/[ox]/ox_lib

  - action: download_github
    src: overextended/ox_inventory
    ref: master
    dest: resources/[ox]/ox_inventory

  # === ZOMBIE + MAPA ===
  - action: download_github
    src: WeponzTV/Standalone-Zombie-System
    ref: main
    dest: resources/[zombie]/standalone-zombies

  - action: download_github
    src: SparksScripts/Total-Apocalypse
    ref: main
    dest: resources/[maps]/total-apocalypse

  # === ALTERNATYWA DLA ox_target (ponieważ oryginalny jest zarchiwizowany) ===
  # Używamy fork/community wersji lub pobieramy przez release (bezpieczniej)
  - action: download_file
    url: https://github.com/communityox/ox_target/releases/latest/download/ox_target.zip
    path: ./tmp/ox_target.zip

  - action: unzip
    src: ./tmp/ox_target.zip
    dest: resources/[ox]/ox_target

  # === SURVIVAL ZASOBY ===
  - action: download_github
    src: SinorScript/sinor-gather
    ref: main
    dest: resources/[survival]/sinor-gather

  # Server.cfg
  - action: write_file
    file: server.cfg
    data: |
      sv_hostname "🧟 Zombie Apocalypse ULTRA SURVIVAL - ALT Loot + Budowanie + Drzewa"
      sv_maxclients 64
      sv_licenseKey "cfxk...yiL1"          # ← ZMIEŃ NA SWÓJ PEŁNY KLUCZ!

      ensure ox_lib
      ensure ox_inventory
      ensure ox_target
      ensure standalone-zombies
      ensure total-apocalypse
      ensure sinor-gather

      onesync on
      setr ox:locale "pl"
